# ============================================================
# Docker Compose — HH.KCHT (M-001 Quản trị hệ thống + M-007 GIS)
# Run: docker-compose up --build
# ============================================================

services:
  # ----------------------------------------------------------
  # Backend: Spring Boot 3 + Java 21 + H2 in-memory (dev)
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kchtgt-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - REDIS_HOST=redis
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    # healthcheck inherited from Dockerfile.backend (curl check)

  # ----------------------------------------------------------
  # Redis: TOTP enrollment sessions
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: kchtgt-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------
  # Frontend: Vite + React 19 + nginx
  # ----------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: kchtgt-frontend
    ports:
      - "3001:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    # healthcheck inherited from Dockerfile.frontend (curl check)
