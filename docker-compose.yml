version: '3.8'

services:
  backend:
    image: registry.etc.vn/hang-hai-kchtgt-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - REDIS_HOST=redis
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: registry.etc.vn/library/redis:8.0.2-alpine
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: registry.etc.vn/hang-hai-kchtgt-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3001:3000"
    restart: always
    depends_on:
      backend:
        condition: service_healthy
