waves:
  - id: W1
    name: "Security fixes + permission normalization"
    parallel_safe: true
    tasks:
      - id: W1-T1
        features: [F-056, F-057, F-058, F-059, F-060, F-061]
        kind: dev-be
        fixes: [SF-001, SF-004]
        severity: CRITICAL
        scope: >
          Add @PreAuthorize to all 9 TramRadarController endpoints using
          tramradar:{create|read|update|delete|approve:c1|approve:c2|history}.
          Wrap all return types in ApiResponse<T> (success + error paths).
        files-glob:
          - "src/main/java/com/hanghai/kchtg/tramradar/controller/TramRadarController.java"
        permission-codes:
          - "tramradar:create"
          - "tramradar:read"
          - "tramradar:update"
          - "tramradar:delete"
          - "tramradar:approve:c1"
          - "tramradar:approve:c2"
          - "tramradar:history"
        notes: >
          Pattern reference: LuongHangHaiController.java.
          Verify ApiResponse<T> import from luonghanghai package before applying.
          Do NOT touch TramRadarService or entity.

      - id: W1-T2
        features: [F-050, F-051, F-052, F-053, F-054, F-055]
        kind: dev-be
        fixes: [SF-002, SF-004]
        severity: HIGH
        scope: >
          Add @PreAuthorize to all 9 CoSuaChuaDongTauController endpoints using
          cosuachua:{create|read|update|delete|approve:c1|approve:c2|history}.
          Wrap all return types in ApiResponse<T> (success + error paths).
        files-glob:
          - "src/main/java/com/hanghai/kchtg/cosuachua/controller/CoSuaChuaDongTauController.java"
        permission-codes:
          - "cosuachua:create"
          - "cosuachua:read"
          - "cosuachua:update"
          - "cosuachua:delete"
          - "cosuachua:approve:c1"
          - "cosuachua:approve:c2"
          - "cosuachua:history"
        notes: >
          Same pattern as W1-T1. Non-overlapping file from W1-T1 — parallel-safe.
          Do NOT touch CoSuaChuaDongTauService or entity.

      - id: W1-T3
        features: [F-038, F-041, F-044, F-047]
        kind: dev-be
        fixes: [SF-003]
        severity: MEDIUM
        scope: >
          Normalize approve permission codes in LuongHangHaiController
          (approve-c1 -> approve:c1, approve-c2 -> approve:c2) and DeKeController
          (same 2 codes). Add all 35 M-003 permission codes to RolePermissionSeeder
          with role bindings (SPECIALIST/LEADER_C1/LEADER_C2/ADMIN/ALL_INTERNAL).
        files-glob:
          - "src/main/java/com/hanghai/kchtg/luonghanghai/controller/LuongHangHaiController.java"
          - "src/main/java/com/hanghai/kchtg/deke/controller/DeKeController.java"
          - "src/main/java/com/hanghai/kchtg/config/RolePermissionSeeder.java"
        permission-codes-to-add-in-seeder:
          luonghanghai: [create, read, update, delete, "approve:c1", "approve:c2", history]
          deke: [create, read, update, delete, "approve:c1", "approve:c2", history]
          cosuachua: [create, read, update, delete, "approve:c1", "approve:c2", history]
          tramradar: [create, read, update, delete, "approve:c1", "approve:c2", history]
          vts: [create, read, update, delete, "approve:c1", "approve:c2", history]
        notes: >
          Must read seedPermission() signature before adding entries — method may
          tokenize permission code differently. VTS codes already use colon; do NOT
          modify VTS @PreAuthorize annotations. Seeder must be idempotent.

  - id: W2
    name: "RBAC security deny-path tests"
    parallel_safe: true
    depends_on_waves: [W1]
    tasks:
      - id: W2-T1
        features: [F-038, F-041, F-044, F-047, F-050, F-053, F-056, F-059, F-062, F-065]
        kind: dev-be
        fixes: []
        severity: MEDIUM
        scope: >
          Write/extend RBAC security deny-path tests for all 5 domains.
          TramRadar + CoSuaChua: add tests verifying 403 for missing permission,
          401 for unauthenticated. LuongHangHai + DeKe: regression test that
          colon-form approve:c1 is accepted, hyphen-form rejected.
          VTS: smoke-pass existing tests unchanged.
        files-glob:
          - "src/test/java/com/hanghai/kchtg/tramradar/controller/TramRadarControllerTest.java"
          - "src/test/java/com/hanghai/kchtg/cosuachua/controller/CoSuaChuaDongTauControllerTest.java"
          - "src/test/java/com/hanghai/kchtg/luonghanghai/LuongHangHaiControllerTest.java"
          - "src/test/java/com/hanghai/kchtg/deke/DeKeControllerTest.java"
          - "src/test/java/com/hanghai/kchtg/vts/controller/HeThongVTSControllerTest.java"
        test-reference: "src/test/java/com/hanghai/kchtg/cangben/BenCangRbacSecurityTest.java"
        notes: >
          Reference MethodSecurityTestConfig from cangben package for test context setup.
          Use @WithMockUser(authorities={"tramradar:read"}) pattern.
          Verify ApiResponse<T> structure in all success responses.
