    id: F-033
    slug: ql-vn-cap-nhat
    name: Quản lý Vùng nước - Cập nhật
    path: docs/modules/M-002-quan-ly-tai-san-kchtgt-cang-ben/_features/F-033-ql-vn-cap-nhat/
    status: done
    classification: local
    confidence: high
    version: 1
    visibility: [PRIVATE]
    consumed_by_modules: []
    depends_on: []
    description: "Cho phép người dùng có thẩm quyền (Admin hoặc Quản lý cảng) cập nhật thông tin của Vùng nước đã tồn tại trong hệ thống, bao gồm tên, Cảng biển quản lý, diện tích, độ sâu, tọa độ, điều kiện hải văn, khả năng thông hành và mục đích sử dụng. Mã vùng nước là trường bất biến sau khi tạo. Hệ thống cảnh báo khi Vùng nước đang chờ phê duyệt, chặn cập nhật khi đã xóa mềm, kích hoạt phê duyệt lại khi thay đổi trường quan trọng (doSau, khaNangThongHanh), và ghi nhật ký thay đổi tự động (LichSuVungNuoc) sau mỗi lần lưu thành công để đảm bảo kiểm toán đầy đủ."
    acceptance_criteria:
      - "Người dùng có role Admin hoặc Quan_ly_cang mới có thể truy cập chức năng cập nhật Vùng nước; role khác nhận HTTP 403 khi gọi API trực tiếp"
      - "Trường mã vùng nước (ma) ở trạng thái read-only trên UI và bị bỏ qua/từ chối ở tầng API nếu được gửi lên; tất cả trường còn lại đều có thể chỉnh sửa"
      - "Hệ thống hiển thị cảnh báo xác nhận khi Vùng nước đang trong trạng thái cho_phe_duyet và chặn hoàn toàn khi trangThai = da_xoa"
      - "Thay đổi trường doSau hoặc khaNangThongHanh tự động kích hoạt yêu cầu phê duyệt lại theo F-035 và cập nhật trangThai thành cho_phe_duyet_lai"
      - "Mỗi lần cập nhật thành công, hệ thống ghi bản ghi LichSuVungNuoc cho từng trường bị thay đổi, bao gồm giaTriCu, giaTriMoi, nguoiCapNhat và thoiGianCapNhat; nhật ký không thể xóa hoặc sửa bởi bất kỳ actor nào"
