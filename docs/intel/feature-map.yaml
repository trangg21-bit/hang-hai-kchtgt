    description: "Tính năng cho phép người dùng nội bộ tra cứu và xem thông tin chi tiết của Cầu cảng bao gồm các trường dữ liệu cơ bản (maCau, tenCau, trangThai), thông tin kỹ thuật mở rộng (loaiKetCau, vatLieuChinh, taiTrongThietKe, chieuDaiCau, chieuRongCau, mucNuocCaoNhat, ghiChu), liên kết đến Bến cảng mẹ, thông tin audit (createdBy, updatedBy, createdAt, updatedAt). Tính năng hỗ trợ tìm kiếm theo mã cầu, tên cầu (partial match, case-insensitive), Bến cảng mẹ và lọc theo trạng thái; danh sách kết quả phân trang 50 mục/trang với sắp xếp theo tên hoặc thời gian tạo. Trường dữ liệu được kiểm soát hiển thị theo vai trò (field-level RBAC): Người dùng tại Cảng (A-004) chỉ xem 4 trường cơ bản; Chuyên viên (A-003) và Lãnh đạo (A-002) xem đầy đủ; kiểm soát áp dụng cả tại API layer."
    acceptance_criteria:
      - "Người dùng có permission VIEW_CAU_CANG có thể tra cứu Cầu cảng theo mã cầu, tên cầu (partial match, case-insensitive) hoặc Bến cảng mẹ với kết quả trả về trong vòng 3 giây (p95) trên tập 614 bản ghi."
      - "Trang chi tiết Cầu cảng hiển thị đầy đủ tất cả trường của entity CauCang (maCau, tenCau, liên kết BenCang mẹ, loaiKetCau, vatLieuChinh, taiTrongThietKe, chieuDaiCau, chieuRongCau, mucNuocCaoNhat, trangThai, ghiChu, createdAt, updatedAt, createdBy, updatedBy) cho vai trò Chuyên viên (A-003) trở lên."
      - "Người dùng tại Cảng (A-004) chỉ nhận được 4 trường cơ bản (maCau, tenCau, trangThai, tenBenCangMe) trong cả UI lẫn API response; các trường kỹ thuật mở rộng không xuất hiện trong JSON response cho token vai trò này."
      - "Danh sách kết quả tìm kiếm hiển thị tối đa 50 bản ghi mỗi trang, có điều hướng phân trang và tùy chọn sắp xếp theo tên hoặc thời gian tạo."
      - "Kết quả tìm kiếm mặc định chỉ hiển thị Cầu cảng trạng thái hien_hanh và tam_ngung; trạng thái cho_phe_duyet và da_xoa chỉ xuất hiện khi bật tùy chọn Xem tất cả."
      - "Người dùng không có permission VIEW_CAU_CANG nhận HTTP 403 Forbidden khi gọi API GET /cau-cang hoặc GET /cau-cang/{id}."
