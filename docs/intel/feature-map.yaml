  F-012:
    id: F-012
    slug: xem-cb
    name: Xem chi tiết Cảng biển
    path: docs/modules/M-002-quan-ly-tai-san-kchtgt-cang-ben/_features/F-012-xem-cb/
    status: done
    classification: local
    confidence: high
    version: 1
    visibility: [PRIVATE]
    consumed_by_modules: []
    depends_on: []
    description: "Tính năng cho phép người dùng nội bộ tra cứu và xem thông tin chi tiết của Cảng biển bao gồm các trường dữ liệu cơ bản (maCang, tenCang, tinhThanh, trangThai), thông tin kỹ thuật mở rộng (toDo GPS, dienTich, khaNangTiepNhanTau, ghiChu), thông tin audit (createdBy, updatedBy, createdAt, updatedAt), và vị trí địa lý hiển thị trên bản đồ tích hợp GIS. Tính năng hỗ trợ tìm kiếm live (debounce \u2264500ms) theo mã cảng, tên cảng, tỉnh/thành phố và lọc theo trạng thái; danh sách kết quả phân trang (50 mục/trang) với sắp xếp theo tên hoặc thời gian tạo. Trường dữ liệu được kiểm soát hiển thị theo vai trò (field-level RBAC): Nhân viên vận hành chỉ xem 4 trường cơ bản; Chuyên viên và Lãnh đạo xem đầy đủ tất cả trường."
    acceptance_criteria:
      - "Người dùng có permission VIEW_CANG_BIEN có thể tra cứu Cảng biển theo mã, tên (partial match, case-insensitive), hoặc tỉnh/thành phố với kết quả trả về trong vòng 3 giây (p95) trên tập 1000 bản ghi."
      - "Trang chi tiết Cảng biển hiển thị đầy đủ 13 trường của entity CangBien (maCang, tenCang, tinhThanh, toDo, dienTich, khaNangTiepNhanTau, trangThai, ghiChu, createdAt, updatedAt, createdBy, updatedBy) kèm bản đồ tích hợp hiển thị tọa độ GPS; nếu toDo null thì hiển thị thông báo \"Chưa có tọa độ\"."
      - "Người dùng vai trò Nhân viên vận hành (A-004) chỉ nhận được 4 trường cơ bản (maCang, tenCang, tinhThanh, trangThai) trong cả UI lẫn API response; các trường kỹ thuật mở rộng không xuất hiện trong JSON response cho token vai trò này."
      - "Danh sách kết quả tìm kiếm hiển thị tối đa 50 bản ghi mỗi trang, có điều hướng phân trang và tùy chọn sắp xếp theo tên hoặc thời gian tạo."
      - "Kết quả tìm kiếm mặc định chỉ hiển thị Cảng biển trạng thái \"Hiện hành\" và \"Tạm ngừng\"; Cảng trạng thái \"Chờ phê duyệt\" và \"Đã xóa\" chỉ xuất hiện khi người dùng bật tùy chọn \"Xem tất cả\"."
      - "Người dùng không có permission VIEW_CANG_BIEN nhận HTTP 403 Forbidden khi gọi API GET /cang-bien hoặc GET /cang-bien/{id}."
