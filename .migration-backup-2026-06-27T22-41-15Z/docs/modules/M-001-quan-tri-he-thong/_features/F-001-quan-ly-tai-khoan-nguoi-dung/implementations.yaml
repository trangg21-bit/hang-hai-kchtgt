feature_id: F-001
module_id: M-001
slug: quan-ly-tai-khoan-nguoi-dung

# Map logical feature → physical code locations.
# Primary owner = service that implements feature's main flow.
# Consumers = services/apps that read or invoke this feature.
implementations:
  primary: "com.hanghai.kchtg.user.service.UserService"
  consumers: ["com.hanghai.kchtg.user.service.TotpAuthService", "com.hanghai.kchtg.user.service.RegistrationService"]

# Cross-cutting: features consumed by multiple modules
consumed_by_modules: ["M-010"]

services:
  - name: "UserService"
    path: "src/main/java/vn/eg/hanghai/service/UserService.java"
    description: "Standard CRUD for user accounts, lock/unlock, password reset"
    tasks: ["1.10"]
  - name: "UserDetailsService"
    path: "src/main/java/vn/eg/hanghai/security/UserDetailsServiceImpl.java"
    description: "Spring Security integration for JWT token generation"
    tasks: ["1.11"]
  - name: "PasswordResetService"
    path: "src/main/java/vn/eg/hanghai/service/PasswordResetService.java"
    description: "Password reset token generation and validation"
    tasks: ["1.12"]
  - name: "TotpService"
    path: "src/main/java/vn/eg/hanghai/service/TotpService.java"
    description: "TOTP 2FA setup, verify, and disable"
    tasks: ["1.13"]
  - name: "ApprovalService"
    path: "src/main/java/vn/eg/hanghai/service/ApprovalService.java"
    description: "Approval workflow: approve/reject pending registrations (BR-001-09 through BR-001-12)"
    tasks: ["1.26"]
  - name: "ApprovalNotificationService"
    path: "src/main/java/vn/eg/hanghai/service/ApprovalNotificationService.java"
    description: "Create approval notification records for approve/reject events"
    tasks: ["1.27"]
  - name: "NotificationEmailService"
    path: "src/main/java/vn/eg/hanghai/service/NotificationEmailService.java"
    description: "Async email dispatch for approval notifications via @Async"
    tasks: ["1.28"]
  - name: "ApprovalController"
    path: "src/main/java/vn/eg/hanghai/controller/ApprovalController.java"
    description: "Approval API endpoints: pending list, approve, reject, pending-status, approve-role"
    tasks: ["1.29"]
