server {
    listen       3000;
    server_name  localhost;

    # Serve static frontend files
    location / {
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    # Use Docker's embedded DNS server and force runtime resolution
    # to prevent Nginx from crashing if the 'backend' container isn't ready.
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Proxy API requests to the backend
    location /api/ {
        set $upstream_backend "http://backend:8080";
        proxy_pass         $upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # H2 Console (dev only)
    location /h2-console/ {
        set $upstream_backend_h2 "http://backend:8080";
        proxy_pass         $upstream_backend_h2;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Gzip settings
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/xml+rss
               application/json application/ld+json;
}
