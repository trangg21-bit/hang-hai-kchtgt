# Wave Plan: M-002 Quản lý tài sản KCHTGT - Cảng & Bến

## Overview

30 features (F-008..F-037) across 5 entities follow an identical CRUD+Approval pattern.
Strategy: W0 establishes shared infrastructure; W1-W4 replicate the pattern per entity group.
Max 4 dev tasks per wave. All inter-wave dependencies are explicit below.

## Entity → Wave Mapping

| Entity       | Wave | Depends on Wave | Rationale                            |
|---|---|---|---|
| Shared infra | W0   | —               | Unblocks all entity waves            |
| CangBien     | W1   | W0              | Root entity, no parent FK            |
| BenCang      | W2   | W1              | FK → cang_bien.id (NOT NULL)         |
| CauCang      | W3   | W2              | FK → ben_cang.id (NOT NULL)          |
| CangCan      | W2   | W0              | Independent — parallel with BenCang  |
| VungNuoc     | W3   | W1              | FK → cang_bien.id — parallel with CauCang |

---

