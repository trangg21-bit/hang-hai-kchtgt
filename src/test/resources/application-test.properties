# Test profile: H2 in-memory, test JWT secret, disabled async for deterministic tests
spring.datasource.url=jdbc:h2:mem:testm018;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.security.oauth2.resourceserver.jwt.jws-algorithm=HS256
jwt.secret=SGVsbG9Xb3JsZFRlc3RTZWNyZXRLZXlGb3JXMDE4VGVzdGluZ1B1cnBvc2VzMTIzNDU2Nzg=
jwt.expiration=3600000
encryption.key=MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
spring.threads.virtual.enabled=true
# Disable async to make tests deterministic (EventPublisher uses @Async)
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=1
