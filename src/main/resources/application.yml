spring:
  application:
    name: kchtg-m001-quan-tri-he-thong

  # Default profile (dev with H2)
  profiles:
    active: local

  # JPA / Hibernate
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # Redis (TOTP enrollment sessions)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

# -- JWT Configuration ------------------------------------------------
jwt:
  secret: ${JWT_SECRET:aXRzLWEtc2VjcmV0LWtleS1mb3Itand0LXRva2VuLWdlbmVyYXRpb24taGFuZ2hhaS1rY2h0Zw==}
  expiration: 86400000
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  mock-token: mock-jwt-token-2026

# -- TOTP / 2FA Configuration -----------------------------------------
totp:
  secret-length-bytes: 20
  code-length: 6
  period-seconds: 30
  tolerance-steps: 1
  max-attempts: 5
  lockout-duration-minutes: 15
  session-ttl-seconds: 300

# -- Encryption Configuration ------------------------------------------------
encryption:
  key: ${ENCRYPTION_KEY:MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=}

# -- Registration Configuration ------------------------------------------------
registration:
  # Password verification token TTL in minutes
  token-ttl-minutes: 30
  # Rate limiting
  rate-limit:
    max-requests: 5
    window-minutes: 5
  # RSA-2048 for client-side password encryption (optional)
  rsa:
    # Public key — shared with client for encryption (Base64-encoded X.509)
    public-key: ${REGISTRATION_RSA_PUBLIC_KEY:}
    # Private key — server-only, used for decryption (Base64-encoded PKCS#8)
    private-key: ${REGISTRATION_RSA_PRIVATE_KEY:}

---
# -- DEV profile (H2 in-memory) ------------------------------------------------
spring:
  main:
    allow-bean-definition-overriding: true
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:kchtg_m001;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      encoding: UTF-8

server:
  port: 8080

logging:
  level:
    com.hanghai.kchtg: DEBUG
    org.springframework.security: DEBUG

---
# -- PROD profile (PostgreSQL) ------------------------------------------------
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kchtg_m001}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:kchtg}
    password: ${DB_PASS:kchtg}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    com.hanghai.kchtg: INFO
    org.springframework.security: WARN