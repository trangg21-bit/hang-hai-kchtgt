# Profile: local (PostgreSQL)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kchtg_m001}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:kchtg}
spring.datasource.password=${DB_PASS:kchtg}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server
server.port=8080

# Logging
logging.level.com.hanghai.kchtg=DEBUG
logging.level.org.springframework.security=DEBUG
# Disable data.sql — use RolePermissionSeeder + DataSeeder instead (they handle seeding at @Profile("local"))
spring.sql.init.mode=never
logging.level.org.hibernate=ERROR
